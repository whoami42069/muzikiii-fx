name: Build Muzikiii FX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Validate AU Plugin
        run: auval -a || true
      - uses: actions/upload-artifact@v4
        with:
          name: MuzikiiiFX-AU
          path: build/MuzikiiiFX_artefacts/Release/AU/

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake
        run: cmake -B build
      - name: Build
        run: cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: MuzikiiiFX-VST3
          path: build/MuzikiiiFX_artefacts/Release/VST3/
